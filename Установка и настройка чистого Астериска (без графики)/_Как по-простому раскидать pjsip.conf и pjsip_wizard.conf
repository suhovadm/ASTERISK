Как по-простому раскидать pjsip.conf и pjsip_wizard.conf ?  

1)	Транк до провайдера прописываем в pjsip.conf  
2)	Единый шаблон (в самом верху) прописываем в pjsip_wizard.conf  

Оба файла живут по пути /etc/asterisk/  

Чаще всего именно так и делают. Почему?  
1)	Меньше кода – для одного пользователя нужна одна секция вместо трёх (endpoint, aor, auth).  
2)	Меньше ошибок – не нужно вручную прописывать строки (auth=… , aors=…), wizard.conf делает это сам.  
3)	Всё наглядно – настройки конкретного абонента (логин, пароль контекст) собраны в одном месте, а не размазаны по трём разным блокам.  

Пример транка до провайдера с регистрацией ( pjsip.conf ).  
[my-provider]                         	   ; Имя секции (например, название провайдера)  
type = wizard  
sends_auth = yes                      		 ; Создать auth для аутентификации у провайдера  
sends_registrations = yes             		 ; Регистрироваться на сервере провайдера  
remote_hosts = sip.provider.net:5060  	   ; Адрес сервера провайдера  
outbound_auth/username = 74951234567       ; Логин (обычно номер) у провайдера  
outbound_auth/password = provpass     	   ; Пароль у провайдера  
endpoint/context = from-trunk         		 ; Контекст для входящих звонков от провайдера  
endpoint/allow = ulaw,alaw,g722       	   ; Кодеки, которые поддерживает провайдер  

Пример транка до провайдера без регистрации ( pjsip.conf ).  
[static-trunk]                         ; Имя секции  
type = wizard  
sends_auth = yes                       ; Аутентификация всё ещё может понадобиться  
; sends_registrations = no             ; Регистрация НЕ нужна (параметр опущен)  
remote_hosts = 192.168.88.1            ; Статический IP-адрес сервера провайдера  
outbound_auth/username = user  
outbound_auth/password = pass  
endpoint/context = from-trunk  

Дальше, в файле pjsip_wizard.conf в самом верху создаётся шаблон,  
от которого будут наследоваться все основные настройки для каждого пользователя.  

Пример шаблона ( pjsip_wizard.conf ):  
[user-template](!)        			    ; символ '!' помечает секцию как шаблон  
type = wizard            				    ; тип мастера (обязательный параметр)  
accepts_auth = yes        	        ; этот шаблон будет принимать регистрации с авторизацией  
accepts_registrations = yes 			  ; шаблон ждёт регистрации от телефонов  
endpoint/disallow = all  			      ; запрещаем все кодеки по умолчанию  
endpoint/allow = ulaw,alaw,gsm		  ; и разрешаем только нужные  
aor/max_contacts = 1      		      ; разрешаем регистрацию только с одного устройства  
endpoint/rewrite_contact = yes		  ; принудительно записываем контактный адрес  
endpoint/transport = udp-phone  	  ; использовать транспортный протокол UDP  

Дальше, под этим шаблоном, всё в том же файле – pjsip_wizard.conf  
создаём пользователей. У них меняются только логин, пароль и контекст из файла  
extensions.conf. Зачем нужно указывать контекст? Он нужен для того, чтобы абонент  
знал, куда можно звонить, куда нельзя, на какие номера будет работать переадресация,  
на какие не будет. С каких номеров запрещено звонить на конкретные номера, с каких – нет.  

Пример пользователя:  
[101](user-template)               	            ; объект для пользователя с внутренним номером 101  
inbound_auth/username = 101                     ; логин для регистрации телефона  
inbound_auth/password = SuperSecret101 				  ; пароль  
endpoint/context = internal-calls  		          ; контекст в файле extensions.conf для обработки звонков этого пользователя  
